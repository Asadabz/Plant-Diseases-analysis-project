<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#123c1d"/>
      <stop offset="60%" stop-color="#081f0e"/>
      <stop offset="100%" stop-color="#030c06"/>
    </radialGradient>

    <!-- Metallic Shield Outer Silver Gradient -->
    <linearGradient id="silverOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#b8c0c5"/>
      <stop offset="50%" stop-color="#a3abb0"/>
      <stop offset="70%" stop-color="#697278"/>
      <stop offset="100%" stop-color="#3a4145"/>
    </linearGradient>

    <!-- Metallic Shield Inner Silver Bevel Gradient -->
    <linearGradient id="silverInner" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#cbd4d9"/>
      <stop offset="70%" stop-color="#788187"/>
      <stop offset="100%" stop-color="#484f54"/>
    </linearGradient>

    <!-- Healthy Leaf Gradient -->
    <linearGradient id="healthyLeaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a6ff3b"/>
      <stop offset="40%" stop-color="#1ebd41"/>
      <stop offset="100%" stop-color="#0a5c1a"/>
    </linearGradient>

    <!-- Diseased Leaf/Decay Gradient -->
    <linearGradient id="diseasedLeaf" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0b828"/>
      <stop offset="50%" stop-color="#b07d17"/>
      <stop offset="100%" stop-color="#593b05"/>
    </linearGradient>

    <!-- Scanning / Data Grid Pattern -->
    <pattern id="dataGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff66" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>

    <!-- Main Shield Drop Shadow -->
    <filter id="shieldShadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#000000" flood-opacity="0.85"/>
    </filter>

    <!-- Scan Line Glow Filter -->
    <filter id="scanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 1. Deep Tech/Nature Textured Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  <rect width="100%" height="100%" fill="url(#dataGrid)"/>

  <!-- Subtle Ambient Light Circle behind the Shield -->
  <circle cx="400" cy="400" r="280" fill="#1ebd41" opacity="0.08" filter="url(#scanGlow)"/>

  <!-- 2. MAIN EMBLEM GROUP WITH DETAILED DROPSHADOW -->
  <g filter="url(#shieldShadow)">
    
    <!-- Outer Shield Layer -->
    <path d="M 400,120 
             Q 530,110 660,150
             Q 670,440 620,600
             Q 550,730 400,800
             Q 250,730 180,600
             Q 130,440 140,150
             Q 270,110 400,120 Z" 
          fill="url(#silverOuter)"/>

    <!-- Inner Shield Rim (Darker Matte Inset to provide 3D depth) -->
    <path d="M 400,145 
             Q 515,135 635,172
             Q 644,425 598,570
             Q 535,690 400,755
             Q 265,690 202,570
             Q 156,425 165,172
             Q 285,135 400,145 Z" 
          fill="#0a1a0f"/>

    <!-- Central Shield Shield Bevel Rim -->
    <path d="M 400,155 
             Q 505,145 615,182
             Q 624,415 580,550
             Q 520,660 400,725
             Q 280,660 220,550
             Q 176,415 185,182
             Q 295,145 400,155 Z" 
          fill="url(#silverInner)"/>

    <!-- Inner Shield Core (Dark Bio-Digital screen) -->
    <path d="M 400,175 
             Q 490,165 590,200
             Q 600,400 560,520
             Q 505,620 400,685
             Q 295,620 240,520
             Q 200,400 210,200
             Q 310,165 400,175 Z" 
          fill="#061209"/>

    <!-- ================= 3. CENTRAL LEAF LOGO (THE CORE INTERACTION) ================= -->
    <g id="central-leaf" transform="translate(400, 420)">
      
      <!-- LEFT SIDE: Healthy Plant Structure -->
      <path d="M 0,-210 
               C -80,-160 -170,-70 -170,30 
               C -170,110 -110,160 0,200 
               L 0,-210 Z" 
            fill="url(#healthyLeaf)"/>

      <!-- RIGHT SIDE: Diseased / Diagnosed Structure -->
      <path d="M 0,-210 
               C 80,-160 170,-70 170,30 
               C 170,110 110,160 0,200 
               L 0,-210 Z" 
            fill="url(#diseasedLeaf)"/>

      <!-- Diseased Side Details: Structural Spots & Leaf Decay Marks -->
      <circle cx="60" cy="-60" r="16" fill="#422a02" opacity="0.75"/>
      <circle cx="63" cy="-63" r="10" fill="#241801"/>
      <circle cx="110" cy="10" r="12" fill="#422a02" opacity="0.75"/>
      <circle cx="112" cy="8" r="7" fill="#241801"/>
      <circle cx="50" cy="80" r="22" fill="#3a2705" opacity="0.8"/>
      <circle cx="48" cy="82" r="14" fill="#1c1201"/>
      
      <!-- Decay/Necrotic Ring Highlights -->
      <circle cx="60" cy="-60" r="20" fill="none" stroke="#d4ae24" stroke-width="2" opacity="0.5"/>
      <circle cx="110" cy="10" r="15" fill="none" stroke="#d4ae24" stroke-width="2" opacity="0.5"/>
      <circle cx="50" cy="80" r="27" fill="none" stroke="#e6c445" stroke-width="2" opacity="0.4"/>

      <!-- Leaf Center Stem / Spine (Gleaming Silver Cutting Through) -->
      <path d="M -4,-215 L 4,-215 L 6,202 L -6,202 Z" fill="url(#silverOuter)"/>

      <!-- Left Side Leaf Veins (Healthy & Tech Integrated) -->
      <path d="M 0,-110 Q -50,-130 -90,-100" fill="none" stroke="#a6ff3b" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      <path d="M 0,-50 Q -70,-80 -130,-30" fill="none" stroke="#a6ff3b" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
      <path d="M 0,20 Q -80,0 -140,60" fill="none" stroke="#a6ff3b" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
      <path d="M 0,90 Q -60,80 -100,130" fill="none" stroke="#a6ff3b" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

      <!-- Right Side Leaf Veins (Decayed / Fragmented) -->
      <path d="M 0,-110 Q 50,-130 80,-115" fill="none" stroke="#593b05" stroke-width="4" stroke-linecap="round"/>
      <path d="M 0,-50 Q 60,-70 100,-60" fill="none" stroke="#593b05" stroke-width="4" stroke-linecap="round"/>
      <path d="M 0,20 Q 55,15 85,5" fill="none" stroke="#593b05" stroke-width="4" stroke-linecap="round"/>
      <path d="M 0,90 Q 50,95 75,120" fill="none" stroke="#593b05" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- ================= 4. TECH TARGETING / SCANNING OVERLAYS ================= -->
    
    <!-- Target UI Corners over the Diseased Area -->
    <path d="M 480, 310 L 560, 310 L 560, 390" fill="none" stroke="#ffcc00" stroke-width="4" stroke-linecap="round" filter="url(#scanGlow)"/>
    <path d="M 580, 470 L 580, 530 L 520, 530" fill="none" stroke="#ffcc00" stroke-width="4" stroke-linecap="round" filter="url(#scanGlow)"/>
    
    <!-- Targeting HUD Lines & Data Readings -->
    <line x1="560" y1="350" x2="610" y2="350" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="620" y="355" fill="#ffcc00" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1">ANOMALY_DET</text>
    
    <line x1="580" y1="500" x2="620" y2="500" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="630" y="505" fill="#ffbb00" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="1">SEV_74%</text>

    <!-- Laser Scanning Beam (Horizontal Glowing Target Line) -->
    <g filter="url(#scanGlow)">
      <line x1="190" y1="450" x2="610" y2="450" stroke="#00ff66" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="220" y1="450" x2="580" y2="450" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Digital Tech Nodes (Glowing Dots) -->
    <circle cx="210" cy="450" r="5" fill="#00ff66" filter="url(#scanGlow)"/>
    <circle cx="590" cy="450" r="5" fill="#00ff66" filter="url(#scanGlow)"/>
    <circle cx="310" cy="320" r="4" fill="#00ff66" opacity="0.7"/>
    <circle cx="260" cy="490" r="4" fill="#00ff66" opacity="0.6"/>

    <!-- ================= 5. SYSTEM STATUS TOP EMBELLISHMENTS ================= -->
    <!-- Top Scanner Lens Frame -->
    <path d="M 360,70 L 440,70 L 420,130 L 380,130 Z" fill="url(#silverOuter)"/>
    <path d="M 370,80 L 430,80 L 415,120 L 385,120 Z" fill="#101a13"/>
    <!-- Glowing AI Core Status Light -->
    <circle cx="400" cy="100" r="12" fill="url(#healthyLeaf)" filter="url(#scanGlow)"/>
    <circle cx="400" cy="100" r="5" fill="#ffffff"/>

    <!-- Hardware Rivets on Shield Rim -->
    <circle cx="155" cy="220" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="645" cy="220" r="4" fill="#ffffff" opacity="0.8"/>
    <circle cx="195" cy="560" r="4" fill="#d5dc40" opacity="0.8"/>
    <circle cx="605" cy="560" r="4" fill="#d5dc40" opacity="0.8"/>
    <circle cx="400" cy="775" r="4.5" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
