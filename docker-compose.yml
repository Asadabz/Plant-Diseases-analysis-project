version: "3.9"

services:
  backend:
    build: ./backend
    container_name: leaf-scan-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/model:/app/model
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: leaf-scan-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
